<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#1a1a2e" stroke="#e94560" stroke-width="8"/>
  
  <!-- SUTRA text -->
  <text x="256" y="200" font-family="Arial, sans-serif" font-size="64" font-weight="bold" 
        fill="#ffffff" text-anchor="middle" letter-spacing="8">SUTRA</text>
  
  <!-- Thread/connecting line motif -->
  <line x1="120" y1="320" x2="392" y2="320" stroke="#e94560" stroke-width="4" stroke-dasharray="8,4"/>
  <line x1="120" y1="340" x2="392" y2="340" stroke="#e94560" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Nodes representing agents -->
  <circle cx="160" cy="380" r="12" fill="#0f3460"/>
  <circle cx="256" cy="380" r="12" fill="#0f3460"/>
  <circle cx="352" cy="380" r="12" fill="#0f3460"/>
  
  <!-- Agent labels -->
  <text x="160" y="410" font-family="Arial, sans-serif" font-size="14" fill="#aaa" text-anchor="middle">L</text>
  <text x="256" y="410" font-family="Arial, sans-serif" font-size="14" fill="#aaa" text-anchor="middle">S</text>
  <text x="352" y="410" font-family="Arial, sans-serif" font-size="14" fill="#aaa" text-anchor="middle">A</text>
  
  <!-- Tagline -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="18" font-style="italic"
        fill="#e94560" text-anchor="middle">Headless ERP for the Offline Economy</text>
</svg>
