name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday 6 AM UTC
  workflow_dispatch:

jobs:
  stale:
    name: Mark stale
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 90
          days-before-issue-close: 30
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 90 days. It will be closed in 30 days
            unless there is new activity.

          # Pull Requests
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: >
            This PR has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity.

          # Exemptions
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,dependencies
